name: Fleet Flow CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: fleet_db
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
      redis:
        image: redis:7
        ports:
          - 6379:6379
      rabbitmq:
        image: rabbitmq:3-management
        ports:
          - 5672:5672

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build common-lib
        run: mvn install -f common-lib/pom.xml

      - name: Build with Maven
        run: mvn clean install -DskipTests # Skipping tests in demo, in real world we run them

      - name: Docker Build Simulation
        run: |
          echo "Building Docker images for all services..."
          # docker build -t api-gateway ./api-gateway
          # docker build -t courier-service ./courier-service
          # ...
