server:
  port: 8081

spring:
  application:
    name: courier-service
  data:
    redis:
      host: localhost
      port: 6379
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

logging:
  level:
    org.springframework.amqp: DEBUG
    com.denizbitmez.courierservice: DEBUG

